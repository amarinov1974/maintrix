name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (workspaces)
        run: npm ci
        working-directory: .

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck (production)
        run: npx tsc --noEmit

      - name: Typecheck (tests)
        run: npm run typecheck:test

      - name: Run tests
        run: npm test

  frontend:
    name: Frontend (lint + typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (workspaces)
        run: npm ci
        working-directory: .

      - name: Lint
        run: npm run lint

      - name: Typecheck (production)
        run: npx tsc --noEmit

      - name: Typecheck (tests)
        run: npm run typecheck:test

      - name: Run tests
        run: npm test
